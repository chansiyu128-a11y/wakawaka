function mergeDeep(target,src){
  for(const k in src){
    if(src[k]&&typeof src[k]==='object'&&!Array.isArray(src[k])){
      if(!target[k])target[k]={};
      mergeDeep(target[k],src[k]);
    } else if(src[k]!==undefined&&src[k]!==null&&src[k]!==''){
      target[k]=src[k];
    }
  }
}

/* ═══════════════════════════════════════════
   SUPABASE CLOUD SYNC
   ═══════════════════════════════════════════ */
const CFG_SK='waka_cfg_v1';
let dbUrl='',dbKey='',cloudMode=false;

function loadCfg(){
  try{
    const c=JSON.parse(localStorage.getItem(CFG_SK)||'{}');
    dbUrl=c.url||'';dbKey=c.key||'';cloudMode=!!(dbUrl&&dbKey);
  }catch(e){}
}

function doConnect(){
  const url=document.getElementById('cfgUrl').value.trim();
  const key=document.getElementById('cfgKey').value.trim();
  const err=document.getElementById('cfgErr');
  if(!url||!key){err.style.display='block';err.textContent='请填写完整的URL和Key';return;}
  localStorage.setItem(CFG_SK,JSON.stringify({url,key}));
  dbUrl=url;dbKey=key;cloudMode=true;
  document.getElementById('setupOv').style.display='none';
  setSyncBar('connecting');
  pullFromCloud();
}

function skipSetup(){
  cloudMode=false;
  document.getElementById('setupOv').style.display='none';
  setSyncBar('local');
}

function setSyncBar(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  if(s==='ok'){dot.style.background='var(--gn)';txt.textContent='☁️ 云端已连接 — 数据多人共享';}
  else if(s==='syncing'){dot.style.background='var(--am)';txt.textContent='🔄 同步中...';}
  else if(s==='err'){dot.style.background='var(--rd)';txt.textContent='⚠️ 同步失败 — 使用本地缓存';}
  else if(s==='local'){dot.style.background='var(--mu)';txt.textContent='💾 本地模式 — 数据仅存此浏览器';}
  else if(s==='connecting'){dot.style.background='var(--am)';txt.textContent='🔌 连接中...';}
}

async function dbReq(table,method,body,extra){
  if(!cloudMode)return null;
  const base=dbUrl+'/rest/v1/'+table;
  const url=method==='GET'?(base+'?select=*'+(extra||'')):base;
  const prefer=method==='POST'?'resolution=merge-duplicates,return=minimal':'';
  const opts={method,headers:{'apikey':dbKey,'Authorization':'Bearer '+dbKey,'Content-Type':'application/json',...(prefer?{'Prefer':prefer}:{})}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  if(!res.ok)throw new Error(res.status+' '+res.statusText);
  if(method==='GET')return res.json();
  return true;
}

let syncTimer=null;
function autoSync(){clearTimeout(syncTimer);syncTimer=setTimeout(syncNow,3000);}

async function syncNow(){
  if(!cloudMode){setSyncBar('local');return;}
  setSyncBar('syncing');
  try{
    // Push prices — only user-modified data (not builtin historical)
    const rows=[];
    for(const co in S.pr)for(const d in S.pr[co])for(const m in S.pr[co][d]){
      const p=S.pr[co][d][m];
      const builtin=BUILTIN_PRICES?.[co]?.[d]?.[m];
      // Only push if user added/changed something beyond the builtin flatbed value
      const userChanged=(p.lowbed||p.quoteIssued||p.quoteSuggested||p.remarks)||(p.flatbed&&(!builtin||p.flatbed!==builtin.flatbed));
      if(userChanged)
        rows.push({country:co,destination:d,month:m,flatbed:p.flatbed||null,lowbed:p.lowbed||null,quote_issued:p.quoteIssued||null,quote_suggested:p.quoteSuggested||null,remarks:p.remarks||null});
    }
    if(rows.length){
      for(let i=0;i<rows.length;i+=50)await dbReq('prices','POST',rows.slice(i,i+50));
    }
    // Push records
    if(S.recs.length){
      const recRows=S.recs.map(r=>{return{id:r.id,data:r}});
      for(let i=0;i<recRows.length;i+=20)await dbReq('records','POST',recRows.slice(i,i+20));
    }
    // Push settings
    await dbReq('settings','POST',[
      {key:'destinations',value:S.ds},
      {key:'meta',value:{tg:S.tg,nt:S.nt,nid:S.nid}}
    ]);
    setSyncBar('ok');
    showT('☁️ 已同步到云端');
  }catch(e){
    console.error('Sync error:',e);
    setSyncBar('err');
    showT('⚠️ 同步失败: '+e.message);
  }
}

async function pullFromCloud(){
  if(!cloudMode)return;
  setSyncBar('syncing');
  try{
    // Pull prices
    const prices=await dbReq('prices','GET');
    if(prices?.length){
      prices.forEach(r=>{
        if(!S.pr[r.country])S.pr[r.country]={};
        if(!S.pr[r.country][r.destination])S.pr[r.country][r.destination]={};
        const obj={};
        if(r.flatbed)obj.flatbed=r.flatbed;
        if(r.lowbed)obj.lowbed=r.lowbed;
        if(r.quote_issued)obj.quoteIssued=r.quote_issued;
        if(r.quote_suggested)obj.quoteSuggested=r.quote_suggested;
        if(r.remarks)obj.remarks=r.remarks;
        if(Object.keys(obj).length)S.pr[r.country][r.destination][r.month]=obj;
      });
    }
    // Pull records
    const recs=await dbReq('records','GET');
    if(recs?.length){
      const map={};
      S.recs.forEach(r=>map[r.id]=r);
      recs.forEach(r=>{if(r.data&&r.data.id)map[r.data.id]=r.data;});
      S.recs=Object.values(map).sort((a,b)=>a.cr<b.cr?1:-1);
    }
    // Pull settings
    const sets=await dbReq('settings','GET');
    if(sets?.length){
      sets.forEach(s=>{
        if(s.key==='destinations'&&s.value)S.ds=s.value;
        if(s.key==='meta'&&s.value){
          if(s.value.tg)S.tg=s.value.tg;
          if(s.value.nt)S.nt=s.value.nt;
          if(s.value.nid&&s.value.nid>S.nid)S.nid=s.value.nid;
        }
      });
    }
    setSyncBar('ok');
    saveS();
    render();
    showT('☁️ 云端数据已加载');
  }catch(e){
    console.error('Pull error:',e);
    setSyncBar('err');
    render();
  }
}

// Override autoS to also trigger cloud sync
const _origAutoS = autoS;
window._cloudAutoS = function(){ _origAutoS(); if(cloudMode)autoSync(); }

/* ═══ INIT ═══ */
loadCfg();
if(!localStorage.getItem(CFG_SK)){
  // First time — show setup
  document.getElementById('setupOv').style.display='flex';
  setSyncBar('local');
} else if(cloudMode){
  setSyncBar('connecting');
  pullFromCloud();
} else {
  setSyncBar('local');
}

render();
</script>
